name: Design Proposal
description: Propose a significant change to DSPy's core abstractions or programming model
title: "[Proposal] "
labels: proposal
body:
  - type: markdown
    attributes:
      value: |
        ## Design Proposal

        Design proposals are for changes that affect DSPy's core abstractions, programming model,
        or public API surface. If you're unsure whether your idea needs a proposal, see the
        [Contributing Guide](../../CONTRIBUTING.md#when-do-i-need-a-design-proposal) for guidance.

        For smaller features or bug fixes, use the [Feature Request](https://github.com/stanfordnlp/dspy/issues/new?template=feature_request.yml)
        or [Bug Report](https://github.com/stanfordnlp/dspy/issues/new?template=bug_report.yml) templates instead.

  - type: textarea
    id: motivation
    attributes:
      label: "Motivation"
      description: "What problem does this solve? Why is the current behavior insufficient?"
      placeholder: "Describe the use case or pain point that motivates this proposal."
    validations:
      required: true

  - type: textarea
    id: proposed-design
    attributes:
      label: "Proposed Design"
      description: "Describe your proposed change. Include API sketches, code examples, or pseudocode where helpful."
      placeholder: |
        Example:

        ```python
        class MyNewModule(dspy.Module):
            ...
        ```

        Describe behavior, key decisions, and how this interacts with existing abstractions.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: "What other approaches did you consider? Why is this design preferred?"
      placeholder: "Describe at least one alternative and why you ruled it out."
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: "Scope and Impact"
      description: "What parts of DSPy does this touch? Are there breaking changes? Does this affect existing modules, optimizers, or adapters?"
      placeholder: |
        - Which modules/files are affected?
        - Any breaking changes to public API?
        - Performance implications?
    validations:
      required: true

  - type: dropdown
    id: champion
    attributes:
      label: "Are you willing to champion this proposal?"
      description: "Champions drive discussion, incorporate feedback, and lead the implementation."
      options:
        - "Yes, I'll champion and implement this"
        - "Yes, I'll champion but would like help implementing"
        - "No, I'm suggesting the idea for others to pick up"
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: "Any references, prior art, notebooks, or benchmarks that support this proposal?"
      placeholder: "Links to related issues, papers, or examples in other frameworks."
