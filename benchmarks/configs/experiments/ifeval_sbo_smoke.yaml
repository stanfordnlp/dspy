name: ifeval_sbo_smoke
description: Minimal IFEval SBO smoke test on qwen3 4b-instruct

dataset_ref: ifeval_fast
model_ref: qwen3_4b
optimizer_ref: sbo_light
program_ref: instruction_following
logging_ref: logging

dataset_overrides:
  train_size: 2
  dev_size: 2
  test_size: 2

optimizer_overrides:
  params:
    max_iterations: 1
    num_candidates: 2
    num_judge_samples: 1
    max_null_steps: 1

logging_overrides:
  save_models: false
