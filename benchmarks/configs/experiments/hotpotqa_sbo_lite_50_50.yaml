name: hotpotqa_sbo_lite_50_50
description: HotPotQA SBO-Lite run with 50 train and 50 dev examples, using context-aware QA

dataset_ref: hotpotqa_standard
model_ref: qwen3_4b
optimizer_ref: sbo_lite
program_ref: simple_context
logging_ref: logging

dataset_overrides:
  train_size: 50
  dev_size: 50
  # DSPy's HotPotQA test split does not include context, so final reporting
  # uses the dev split for this local context-aware experiment.
  test_size: 0
  params:
    use_context: true
    input_fields:
      - question
      - context

model_overrides:
  params:
    max_tokens: 512

optimizer_overrides:
  params:
    max_iterations: 10
    max_null_steps: 10
    stop_on_no_improving_candidate: false
    num_candidates: 3
    descent_param: 0.05
    num_eval_samples: 1
    bundle_size: 10
    active_bundle_size: 2
    watchlist_size: 2
    parse_failure_retries: 3
    parse_retry_temperature: 0.7
    max_critique_examples: 3
    max_critique_field_chars: 1800
    max_bundle_critique_chars: 500
    judge_max_tokens: 1024
    proposer_max_tokens: 3072
    critic_max_tokens: 3072
    temperature: 0.5
    judge_temperature: 0.5
    judge_cache: false
    proposer_temperature: 0.5
    critic_temperature: 0.5
    eval_temperature: 0.7
    eval_cache: false
    track_stats: true

logging_overrides:
  save_models: false
  level: INFO
