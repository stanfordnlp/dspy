name: hotpotqa_sbo_smoke
description: Minimal HotPotQA SBO smoke test to verify local Ollama experiment execution

dataset_ref: hotpotqa_standard
model_ref: qwen3_4b
optimizer_ref: sbo_light
program_ref: simple_context
logging_ref: logging

dataset_overrides:
  train_size: 2
  dev_size: 1
  test_size: 0

optimizer_overrides:
  params:
    max_iterations: 1
    num_candidates: 1
    num_judge_samples: 1
    max_null_steps: 1
    temperature: 0.2
    proposer_temperature: 0.2
    critic_temperature: 0.2

logging_overrides:
  save_models: false
